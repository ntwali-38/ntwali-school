<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - School Connect Rwanda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1') no-repeat center center/cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 450px;
            width: 100%;
        }
        .role-tabs {
            display: flex;
            margin-bottom: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 0.5rem;
        }
        .role-tab {
            flex: 1;
            padding: 0.75rem;
            text-align: center;
            border: none;
            background: transparent;
            color: #ccc;
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .role-tab.active {
            background: #4CAF50;
            color: white;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 10px;
            padding: 12px 15px;
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #4CAF50;
            color: white;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.3);
        }
        .btn-login {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }
        .alert {
            border-radius: 10px;
            margin-bottom: 1rem;
        }
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #4CAF50;
            margin-bottom: 0.5rem;
        }
        .logo p {
            color: #ccc;
            margin: 0;
        }
        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #ccc;
        }
        .register-link a {
            color: #4CAF50;
            text-decoration: none;
            font-weight: 600;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🎓 SchoolConnect</h1>
            <p>Rwanda Education Portal</p>
        </div>

        <div class="role-tabs">
            <button class="role-tab active" data-role="student">
                <i class="fas fa-user-graduate me-2"></i>login 
            </button>

        </div>
 
        <div id="message" class="alert" style="display: none;"></div>

        <form id="loginForm">
            <input type="hidden" id="role" value="student">
            
            <div class="mb-3">
                <label for="email" class="form-label text-white">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-dark text-white">
                        <i class="fas fa-envelope"></i>
                    </span>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label text-white">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-dark text-white">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                </div>
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="remember">
                <label class="form-check-label text-white" for="remember">
                    Remember me
                </label>
            </div>

            <button type="submit" class="btn btn-success btn-login w-100" id="loginBtn">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
        </form>

        <div class="register-link">
            Don't have an account? <a href="#" id="showRegister">Register here</a>
        </div>

        <!-- Registration Form (Hidden by default) -->
        <form id="registerForm" style="display: none;">
            <input type="hidden" id="registerRole" value="student">
            
            <div class="mb-3">
                <label for="regName" class="form-label text-white">Full Name</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-dark text-white">
                        <i class="fas fa-user"></i>
                    </span>
                    <input type="text" class="form-control" id="regName" placeholder="Enter your full name" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="regEmail" class="form-label text-white">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-dark text-white">
                        <i class="fas fa-envelope"></i>
                    </span>
                    <input type="email" class="form-control" id="regEmail" placeholder="Enter your email" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="regPassword" class="form-label text-white">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-dark text-white">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" class="form-control" id="regPassword" placeholder="Create a password" required>
                </div>
            </div>

            <div class="mb-4">
                <label for="regConfirmPassword" class="form-label text-white">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-dark text-white">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" class="form-control" id="regConfirmPassword" placeholder="Confirm your password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-success btn-login w-100" id="registerBtn">
                <i class="fas fa-user-plus me-2"></i>Register
            </button>
        </form>

        <div class="register-link" id="backToLogin" style="display: none;">
            Already have an account? <a href="#" id="showLogin">Login here</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="auth.js"></script>
</body>
</html>
